name: Refresh offers

on:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC
  workflow_dispatch:      # allow manual trigger from GitHub UI

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-offers
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build all profiles
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_APPRENTISSAGE_KEY: ${{ secrets.API_APPRENTISSAGE_KEY }}
        run: python scripts/build_offers.py --all

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: refresh offers [skip ci]"
            git push
          fi

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo ${{ github.repository }}
